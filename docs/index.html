<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Status</title>
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .service {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }

        .service:last-child {
            border-bottom: none;
        }

        .status {
            font-weight: 600;
        }

        .up {
            color: #22c55e;
        }

        .down {
            color: #ef4444;
        }

        .overall {
            margin-bottom: 20px;
            font-weight: 700;
        }

        .overall.up {
            color: #22c55e;
        }

        .overall.down {
            color: #ef4444;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>System Status</h1>
        <div class="subtitle">Live server availability</div>

        <div class="card">
            <div id="overall"
                 class="overall">Checking...
            </div>
            <div id="services"></div>
        </div>

        <div class="footer"
             id="updated"></div>
    </div>

    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/Lixetron/f07cb01096c75e67d813fc3fe6a0bb99/raw/status.json';

        async function loadStatus() {
            try {
                const res = await fetch(GIST_URL + '?t=' + Date.now());
                const data = await res.json();

                const servicesDiv = document.getElementById('services');
                const overallDiv = document.getElementById('overall');
                const updatedDiv = document.getElementById('updated');

                servicesDiv.innerHTML = '';

                let allUp = true;

                for (const [name, status] of Object.entries(data.services)) {
                    if (status !== 'up') allUp = false;

                    const el = document.createElement('div');
                    el.className = 'service';

                    el.innerHTML = `
            <div>${name}</div>
            <div class="status ${status}">
              ${status.toUpperCase()}
            </div>
          `;

                    servicesDiv.appendChild(el);
                }

                overallDiv.textContent = allUp
                    ? 'All systems operational'
                    : 'Some systems are down';

                overallDiv.className = 'overall ' + (allUp ? 'up' : 'down');

                updatedDiv.textContent = 'Last updated: ' + data.updated;

            } catch (e) {
                document.getElementById('overall').textContent =
                    'Error loading status';
            }
        }

        loadStatus();

        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
