name = "status"
main = "src/worker/index.ts"
compatibility_date = "2025-05-01"
workers_dev = false
preview_urls = false

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "servers-status"
database_id = "8e973e51-870c-4024-b1ac-6e4c3f87df33"

# Static UI lives in ./public — same files can be served by any static host (see package.json "preview:static").
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
