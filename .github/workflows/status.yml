name: Server Status

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check servers
        run: |
          check() {
            HOST=$1
            timeout 5 bash -c "</dev/tcp/$HOST/443" 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "up"
            else
              echo "down"
            fi
          }

          LIX=$(check "reload.pl.lixetron.top")
          BYL=$(check "bubblegum.byl04ka.duckdns.org")

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat <<EOF > status.json
  {
    "updated": "$NOW",
    "services": {
      "lixetron.top": "$LIX",
      "byl04ka.duckdns.org": "$BYL"
    }
  }
  EOF

- name: Update Gist
  env:
    GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
    GIST_ID: ${{ secrets.GIST_ID }}
  run: |
    curl -X PATCH "https://api.github.com/gists/$GIST_ID" \
      -H "Authorization: Bearer $GITHUB_TOKEN" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
  {
    "files": {
      "status.json": {
        "content": $(cat status.json | jq -Rs .)
      }
    }
  }
  EOF
