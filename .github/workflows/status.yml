name: Server Status

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check Servers
        id: check
        run: |
          check() {
            HOST=$1
            timeout 5 bash -c "</dev/tcp/$HOST/443" 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "up"
            else
              echo "down"
            fi
          }

          LIX=$(check "reload.pl.lixetron.top")
          BYL=$(check "bubblegum.byl04ka.duckdns.org")

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          JSON=$(jq -n \
            --arg time "$NOW" \
            --arg lix "$LIX" \
            --arg byl "$BYL" \
            '{
              updated: $time,
              services: {
                "lixetron.top": $lix,
                "byl04ka.duckdns.org": $byl
              }
            }')

          echo "$JSON" > status.json

      - name: Update Gist
        env:
          TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          CONTENT=$(cat status.json | jq -Rs .)

          curl -X PATCH "https://api.github.com/gists/$GIST_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\": {\"status.json\": {\"content\": $CONTENT }}}"
